<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif">
  <!-- ============================================================= -->
  <!-- flow-search.svg  ·  搜索演进与增量索引流程                      -->
  <!-- 复用 docs/_svg_style_spec.md 的 defs / 配色 / 连线规范          -->
  <!-- ============================================================= -->
  <defs>
    <linearGradient id="gClient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gGate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="gProduct" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="gData" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gMQ" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
    <!-- ===== Component Icons (24x24, white) ===== -->
    <!-- MySQL: 数据库圆柱 + 海豚尾鳍点睛 -->
    <symbol id="ic-mysql" viewBox="0 0 24 24">
      <g fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round">
        <ellipse cx="11" cy="5.2" rx="6.6" ry="2.4"/>
        <path d="M4.4 5.2 V15 c0 1.33 2.96 2.4 6.6 2.4 s6.6-1.07 6.6-2.4 V5.2"/>
        <path d="M4.4 10.1 c0 1.33 2.96 2.4 6.6 2.4 s6.6-1.07 6.6-2.4" stroke-opacity="0.65"/>
      </g>
      <path d="M16.4 14.2 c2.2 0.2 3.4 1.6 4.2 3.4 c-1.7-0.7-2.6-0.5-3.4-0.2 c0.5-1.1 0.1-2.2-0.8-3.2 z" fill="#ffffff"/>
    </symbol>
    <!-- Redis: 堆叠立方(三层菱形) -->
    <symbol id="ic-redis" viewBox="0 0 24 24">
      <g fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round">
        <path d="M2.6 7.2 L12 3.4 L21.4 7.2 L12 11 Z"/>
        <path d="M2.6 12 L12 15.8 L21.4 12"/>
        <path d="M2.6 16.6 L12 20.4 L21.4 16.6"/>
      </g>
      <circle cx="12" cy="7.2" r="1.1" fill="#ffffff"/>
    </symbol>
    <!-- RabbitMQ: 消息队列(信封 + 流转箭头) -->
    <symbol id="ic-rabbitmq" viewBox="0 0 24 24">
      <rect x="3" y="6" width="14" height="10" rx="1.6" fill="none" stroke="#ffffff" stroke-width="1.6"/>
      <path d="M3.6 7 L10 11.4 L16.4 7" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M16 18.6 h4 m0 0 l-2-2 m2 2 l-2 2" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <!-- ElasticSearch: 放大镜(检索) -->
    <symbol id="ic-es" viewBox="0 0 24 24">
      <circle cx="10" cy="10" r="6" fill="none" stroke="#ffffff" stroke-width="1.7"/>
      <path d="M14.6 14.6 L20 20" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <path d="M7.4 10 h5.2 M10 7.4 v5.2" stroke="#ffffff" stroke-width="1.3" stroke-opacity="0.7"/>
    </symbol>
    <!-- Milvus: 向量散点(近邻连边) -->
    <symbol id="ic-milvus" viewBox="0 0 24 24">
      <g stroke="#ffffff" stroke-width="1.3" stroke-opacity="0.7">
        <path d="M6 7 L12 12 M18 6 L12 12 M5 17 L12 12 M17 17 L12 12"/>
      </g>
      <g fill="#ffffff">
        <circle cx="6" cy="7" r="1.7"/><circle cx="18" cy="6" r="1.7"/>
        <circle cx="5" cy="17" r="1.7"/><circle cx="17" cy="17" r="1.7"/>
        <circle cx="12" cy="12" r="2.2"/>
      </g>
    </symbol>
    <!-- Web3 / EVM: 以太坊菱形 -->
    <symbol id="ic-web3" viewBox="0 0 24 24">
      <g fill="#ffffff">
        <path d="M12 2 L18.4 12 L12 15.6 L5.6 12 Z" fill-opacity="0.95"/>
        <path d="M12 2 L18.4 12 L12 9.4 Z" fill-opacity="0.6"/>
        <path d="M12 16.9 L18.4 13.2 L12 22 L5.6 13.2 Z"/>
      </g>
    </symbol>
    <!-- Web Portal: 浏览器窗口 -->
    <symbol id="ic-web" viewBox="0 0 24 24">
      <rect x="3" y="4.5" width="18" height="15" rx="1.8" fill="none" stroke="#ffffff" stroke-width="1.6"/>
      <path d="M3 8.6 H21" stroke="#ffffff" stroke-width="1.6"/>
      <g fill="#ffffff"><circle cx="5.6" cy="6.5" r="0.8"/><circle cx="8" cy="6.5" r="0.8"/></g>
    </symbol>
    <!-- Mobile App: 手机 -->
    <symbol id="ic-mobile" viewBox="0 0 24 24">
      <rect x="7" y="3" width="10" height="18" rx="2.2" fill="none" stroke="#ffffff" stroke-width="1.6"/>
      <path d="M10.4 18 h3.2" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>
    <!-- Gateway: 盾形(网关/中间件) -->
    <symbol id="ic-gateway" viewBox="0 0 24 24">
      <path d="M12 2.6 L20 5.4 V11 c0 5.2-3.4 8.2-8 10.4 C7.4 19.2 4 16.2 4 11 V5.4 Z" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M8.6 11.6 L11 14 L15.4 9" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <!-- Outbox: 发件箱(箱 + 上行箭头) -->
    <symbol id="ic-outbox" viewBox="0 0 24 24">
      <path d="M3.5 12 H8 l1.4 2.2 h4.2 L15 12 h5.5 V19 a1.4 1.4 0 0 1-1.4 1.4 H4.9 A1.4 1.4 0 0 1 3.5 19 Z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M12 9.6 V2.8 m0 0 L9.4 5.4 M12 2.8 l2.6 2.6" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1200" height="760" fill="#0d1117"/>

  <!-- ===================== 标题区 ===================== -->
  <g>
    <text x="60" y="52" fill="#ffffff" font-size="26" font-weight="700">搜索：LIKE → ES → ES+Milvus 混合</text>
    <text x="60" y="80" fill="rgba(255,255,255,0.55)" font-size="14">检索三档演进　+　Outbox 增量索引保证索引与库一致</text>
  </g>

  <!-- ===================== 图例 legend ===================== -->
  <g>
    <line x1="860" y1="46" x2="898" y2="46" stroke="#38bdf8" stroke-width="2"/>
    <text x="906" y="50" fill="rgba(255,255,255,0.7)" font-size="12">同步查询</text>
    <line x1="990" y1="46" x2="1028" y2="46" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="1036" y="50" fill="rgba(255,255,255,0.7)" font-size="12">异步索引</text>
    <rect x="860" y="64" width="14" height="14" rx="3" fill="url(#gProduct)"/>
    <text x="880" y="76" fill="rgba(255,255,255,0.7)" font-size="12">检索服务</text>
    <rect x="980" y="64" width="14" height="14" rx="3" fill="url(#gData)"/>
    <text x="1000" y="76" fill="rgba(255,255,255,0.7)" font-size="12">存储/索引</text>
  </g>

  <!-- =============================================================== -->
  <!-- A. 检索演进（实线，上半区，三档对照）                            -->
  <!-- =============================================================== -->
  <g>
    <rect x="48" y="108" width="1104" height="296" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
    <text x="68" y="134" fill="rgba(255,255,255,0.45)" font-size="13" letter-spacing="2">A · 检索演进　三档对照（同步查询）</text>

    <!-- 档1: LIKE 模糊 -->
    <g>
      <rect x="72" y="156" width="218" height="100" rx="8" fill="url(#gProduct)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)" opacity="0.62"/>
      <text x="90" y="180" fill="rgba(255,255,255,0.7)" font-size="11">[档 1 · 起步]</text>
      <text x="90" y="204" fill="#ffffff" font-size="17" font-weight="700">LIKE 模糊</text>
      <text x="90" y="226" fill="rgba(255,255,255,0.85)" font-size="11.5">SELECT … WHERE name LIKE '%kw%'</text>
      <text x="90" y="244" fill="rgba(255,255,255,0.85)" font-size="11.5">无法走索引 · 大表慢 · 不支持语义</text>
    </g>

    <!-- 档2: ES 倒排 -->
    <g>
      <rect x="338" y="156" width="218" height="100" rx="8" fill="url(#gProduct)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)" opacity="0.82"/>
      <text x="356" y="180" fill="rgba(255,255,255,0.7)" font-size="11">[档 2 · 关键词]</text>
      <text x="356" y="204" fill="#ffffff" font-size="17" font-weight="700">ElasticSearch 倒排</text>
      <text x="356" y="226" fill="rgba(255,255,255,0.85)" font-size="11.5">SearchProducts 多字段倒排召回</text>
      <text x="356" y="244" fill="rgba(255,255,255,0.85)" font-size="11.5">分词 · 相关性打分 · 毫秒级</text>
    </g>

    <!-- 档3: ES + Milvus 混合 (核心，发光) -->
    <g>
      <rect x="604" y="150" width="244" height="112" rx="8" fill="url(#gProduct)" stroke="rgba(45,212,191,0.9)" stroke-width="1.6" filter="url(#glow)"/>
      <text x="622" y="174" fill="rgba(255,255,255,0.72)" font-size="11">[档 3 · 当前 · 混合检索]</text>
      <text x="622" y="198" fill="#ffffff" font-size="17" font-weight="700">ES + Milvus 向量</text>
      <text x="622" y="220" fill="rgba(255,255,255,0.9)" font-size="11.5">SemanticSearch · 关键词 + 语义</text>
      <text x="622" y="238" fill="rgba(255,255,255,0.9)" font-size="11.5">加权融合 50/50 · TopK 排序</text>
      <text x="622" y="256" fill="rgba(255,255,255,0.9)" font-size="11.5">ES 故障降级走纯向量</text>
    </g>

    <!-- 演进箭头 LIKE → ES → 混合 (实线) -->
    <g>
      <path d="M290 206 L338 206" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <text x="296" y="198" fill="rgba(255,255,255,0.6)" font-size="11">演进</text>
      <path d="M556 206 L604 206" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <text x="560" y="198" fill="rgba(255,255,255,0.6)" font-size="11">演进</text>
    </g>

    <!-- 混合检索查询双路召回 → 融合 -->
    <g>
      <!-- ES 倒排召回 -->
      <rect x="896" y="150" width="232" height="48" rx="8" fill="url(#gData)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="912" y="170" fill="rgba(255,255,255,0.62)" font-size="11">[关键词 · 倒排]</text>
      <use href="#ic-es" x="912" y="176" width="18" height="18"/>
      <text x="936" y="188" fill="#ffffff" font-size="13.5" font-weight="700">ES 倒排召回 (keyword)</text>

      <!-- Milvus 向量召回 -->
      <rect x="896" y="214" width="232" height="48" rx="8" fill="url(#gData)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="912" y="234" fill="rgba(255,255,255,0.62)" font-size="11">[语义 · 近邻]</text>
      <use href="#ic-milvus" x="912" y="240" width="18" height="18"/>
      <text x="936" y="252" fill="#ffffff" font-size="13.5" font-weight="700">Milvus 向量召回 (ANN)</text>
    </g>
    <!-- 混合 → 两路召回 (实线) -->
    <g>
      <path d="M848 192 L878 192 L878 174 L896 174" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <path d="M848 222 L878 222 L878 238 L896 238" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <rect x="852" y="300" width="120" height="0" />
    </g>

    <!-- 融合排序 → 回 product 详情 -->
    <g>
      <rect x="338" y="300" width="510" height="84" rx="8" fill="url(#gProduct)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="356" y="324" fill="rgba(255,255,255,0.62)" font-size="11">[融合 · 排序 · 回表]</text>
      <text x="356" y="346" fill="#ffffff" font-size="16" font-weight="700">融合排序 → 回 product 详情</text>
      <text x="356" y="368" fill="rgba(255,255,255,0.85)" font-size="11.5">两路分数 min-max 归一 → 加权融合 → 截断 TopK → loadProductsByIDs 回 DB 取详情</text>
    </g>
    <!-- 两路召回 → 融合 (实线，下行汇聚) -->
    <g>
      <path d="M896 174 L872 174 L872 286 L596 286 L596 300" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <path d="M896 238 L884 238 L884 290 L630 290 L630 300" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <rect x="640" y="276" width="96" height="16" rx="3" fill="#0d1117" opacity="0.85"/>
      <text x="644" y="288" fill="rgba(255,255,255,0.7)" font-size="11">两路召回汇聚</text>
    </g>
  </g>

  <!-- =============================================================== -->
  <!-- B. 增量索引（虚线异步，下半区）                                  -->
  <!-- =============================================================== -->
  <g>
    <rect x="48" y="428" width="1104" height="296" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
    <text x="68" y="454" fill="rgba(255,255,255,0.45)" font-size="13" letter-spacing="2">B · 增量索引　Outbox 异步同步（保证索引与库一致）</text>

    <!-- product 写变更 -->
    <g>
      <rect x="72" y="482" width="190" height="100" rx="8" fill="url(#gProduct)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="90" y="506" fill="rgba(255,255,255,0.62)" font-size="11">[商品写操作]</text>
      <text x="90" y="528" fill="#ffffff" font-size="15.5" font-weight="700">product 变更</text>
      <text x="90" y="550" fill="rgba(255,255,255,0.85)" font-size="11.5">新增 / 更新 / 下架</text>
      <text x="90" y="568" fill="rgba(255,255,255,0.85)" font-size="11.5">与业务同事务</text>
    </g>

    <!-- outbox -->
    <g>
      <rect x="312" y="482" width="190" height="100" rx="8" fill="url(#gMQ)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="330" y="506" fill="rgba(255,255,255,0.62)" font-size="11">[outbox 表]</text>
      <use href="#ic-outbox" x="330" y="514" width="20" height="20"/>
      <text x="358" y="528" fill="#ffffff" font-size="15.5" font-weight="700">写 outbox</text>
      <text x="330" y="550" fill="rgba(255,255,255,0.85)" font-size="11.5">product.changed 事件</text>
      <text x="330" y="568" fill="rgba(255,255,255,0.85)" font-size="11.5">本地事务原子落库</text>
    </g>

    <!-- 消费者 -->
    <g>
      <rect x="552" y="482" width="190" height="100" rx="8" fill="url(#gMQ)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="570" y="506" fill="rgba(255,255,255,0.62)" font-size="11">[消费者 · indexer]</text>
      <text x="570" y="528" fill="#ffffff" font-size="15.5" font-weight="700">StartProductIndexer</text>
      <text x="570" y="550" fill="rgba(255,255,255,0.85)" font-size="11.5">绑定 product.changed</text>
      <text x="570" y="568" fill="rgba(255,255,255,0.85)" font-size="11.5">失败 Nack 重投幂等</text>
    </g>

    <!-- ES 索引 -->
    <g>
      <rect x="792" y="468" width="320" height="58" rx="8" fill="url(#gData)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="810" y="490" fill="rgba(255,255,255,0.62)" font-size="11">[ElasticSearch 倒排索引]</text>
      <use href="#ic-es" x="810" y="499" width="19" height="19"/>
      <text x="836" y="512" fill="#ffffff" font-size="14.5" font-weight="700">UpsertProduct / DeleteProduct</text>
    </g>
    <!-- Milvus 索引 -->
    <g>
      <rect x="792" y="540" width="320" height="58" rx="8" fill="url(#gData)" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" filter="url(#shadow)"/>
      <text x="810" y="562" fill="rgba(255,255,255,0.62)" font-size="11">[Milvus 向量索引]</text>
      <use href="#ic-milvus" x="810" y="571" width="19" height="19"/>
      <text x="836" y="584" fill="#ffffff" font-size="14.5" font-weight="700">Embedding → upsert 向量</text>
    </g>

    <!-- 链路虚线: product → outbox → consumer → ES / Milvus -->
    <g>
      <path d="M262 532 L312 532" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowA)"/>
      <text x="266" y="524" fill="rgba(255,255,255,0.6)" font-size="11">事务内写</text>

      <path d="M502 532 L552 532" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowA)"/>
      <text x="506" y="524" fill="rgba(255,255,255,0.6)" font-size="11">投递 MQ</text>

      <!-- consumer → ES -->
      <path d="M742 510 L768 510 L768 497 L792 497" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowA)"/>
      <!-- consumer → Milvus -->
      <path d="M742 554 L768 554 L768 569 L792 569" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowA)"/>
      <rect x="748" y="615" width="200" height="0"/>
    </g>

    <!-- 一致性注脚 -->
    <text x="312" y="612" fill="rgba(255,255,255,0.55)" font-size="11.5">Outbox 把"写库"与"发事件"绑进同一本地事务 → 消费侧幂等重试 → 索引最终与 DB 一致</text>
  </g>

  <!-- 跨区呼应: 增量索引的 ES/Milvus 即上半区检索召回的数据源 (虚线竖向呼应) -->
  <g>
    <path d="M1130 468 L1148 468 L1148 174 L1130 174" stroke="#fbbf24" stroke-width="1.6" stroke-dasharray="4,4" fill="none" opacity="0.6"/>
    <rect x="1090" y="312" width="0" height="0"/>
    <text x="1150" y="324" fill="rgba(255,255,255,0.4)" font-size="10" transform="rotate(90 1150 324)">同一份索引：写侧建 · 读侧召回</text>
  </g>

</svg>
